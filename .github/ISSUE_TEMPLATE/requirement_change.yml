name: Requirement change
description: Propose a feature or behavior change
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What problem or user need should this change address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the desired behavior and scope.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Observable outcome one
        - [ ] Observable outcome two
    validations:
      required: true
  - type: textarea
    id: exclusions
    attributes:
      label: Out of scope
      description: List behavior that must not change.
